<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #0b1120; /* deeper, richer dark */
            font-family: 'Inter', sans-serif;
        }

        /* Layout */
        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #020617;
            padding: 20px;
            color: #e2e8f0;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #4f46e5;
            border-radius: 50%;
        }
.status {
    font-size: 12px;
    color: #22c55e;
    display: flex;
    align-items: center;
    gap: 6px;
}

.status-dot {
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    position: relative;
}

.status-dot::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.7; }
    70% { transform: scale(2.5); opacity: 0; }
    100% { opacity: 0; }
}

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .chat-header {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #e2e8f0;
        }

        /* Messages */
         .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: radial-gradient(circle at top, #0f172a, #020617);
        }
        .message {
            max-width: 65%;
            padding: 10px 14px;
            margin-bottom: 6px;
            border-radius: 14px;
            font-size: 14px;
            position: relative;
            animation: fadeIn 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* YOU */
        .sent {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #ffffff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        /* OTHERS */
        .received {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #ffffff;
            border-bottom-left-radius: 4px;
        }

        .time {
            font-size: 10px;
            margin-top: 4px;
        }
        .sent .time {
    color: rgba(255,255,255,0.7);
}
.received .time {
    color: #94a3b8;
}
        /* Input */
        .input-area {
            padding: 15px;
            background: #020617;
            border-top: 1px solid #1e293b;
            display: flex;
            gap: 10px;
        }



        button {
            background: #4f46e5;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: #4338ca;
        }

        /* Typing indicator */
        .typing {
            font-size: 12px;
            color: #94a3b8;
            padding-left: 5px;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar i {
        color: white;
         font-size: 16px;
        }
        .sender-name {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
}/* For YOU */
.sent .sender-name {
    color: #c7d2fe; /* soft indigo */
}/* For OTHERS */
.received .sender-name {
    color: #38bdf8; /* subtle blue highlight */
}
        .message {
    margin-bottom: 4px;
}

.message.received + .message.received,
.message.sent + .message.sent {
    margin-top: 2px;
}

.sender-name {
    margin-top: 10px;
}
        .input-area {
    padding: 12px;
    background: rgba(2, 6, 23, 0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.05);
}
        input {
    flex: 1;
    background: #020617;
    border: 1px solid rgba(255,255,255,0.08);
    color: #e2e8f0;
    padding: 10px;
    border-radius: 10px;
    transition: 0.2s;
}

input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
}
button {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(99,102,241,0.4);
}
        .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-weight: 600;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
        .typing {
    font-size: 12px;
    color: #94a3b8;
    padding-left: 10px;
    opacity: 0.8;
}
    </style>
</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="profile">
            <div id="avatar" class="avatar d-flex align-items-center justify-content-center"></div>
            <div>
                <div id="username">Your Name</div>
                <div class="status">
                    <div class="status-dot"></div>
                    Online
                </div>
            </div>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-area">

        <div class="chat-header">
            <div class="avatar d-flex align-items-center justify-content-center">
                <i class="fa-solid fa-comments"></i>
            </div>
            <div>Global Chat</div>
        </div>

        <div id="chat" class="chat-box"></div>

        <div id="typing" class="typing"></div>

        <div class="input-area">
            <input id="senderInput" type="text" placeholder="Your name">
            <input id="messageInput" type="text" placeholder="Type message...">
            <button id="sendMessage">Send</button>
        </div>

    </div>

</div>

<script>
    let stompClient = null;
    let typingTimeout = null;
    let lastSender = null;
    function setConnected(connected) {
        document.getElementById('sendMessage').disabled = !connected;
    }
    document.getElementById('messageInput').addEventListener('input', () => {
         const sender = document.getElementById('senderInput').value;

         if (!sender) return;

         stompClient.send("/app/typing", {}, JSON.stringify({
            sender: sender
         }));
    });

    function connect() {
        var socket = new SockJS('/chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            setConnected(true);

            stompClient.subscribe('/topic/messages', function (message) {
                showMessage(JSON.parse(message.body));
            });
            stompClient.subscribe('/topic/typing', function (message) {
                showTyping(JSON.parse(message.body));
            });
        });
    }

   function showMessage(message) {
    const chat = document.getElementById('chat');
    const currentUser = document.getElementById('senderInput').value;

    const isSent = message.sender === currentUser;
    const displayName = isSent ? "You" : message.sender;

    const msg = document.createElement('div');
    msg.classList.add('message');

    if (isSent) {
        msg.classList.add('sent');
    } else {
        msg.classList.add('received');
    }

    const time = new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });

    let nameHTML = "";

    if (lastSender !== message.sender) {
        nameHTML = `<div class="sender-name">${displayName}</div>`;
        lastSender = message.sender;
    }

    msg.innerHTML = `
        ${nameHTML}
        <div>${message.content}</div>
        <div class="time">${time}</div>
    `;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}
    function showTyping(data) {
    const typingDiv = document.getElementById('typing');
    const currentUser = document.getElementById('senderInput').value;

    if (data.sender === currentUser) return;

    typingDiv.textContent = data.sender + " is typing...";

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
        typingDiv.textContent = "";
    }, 1500);
}
    function updateAvatar(name) {
        const avatar = document.getElementById('avatar');

        if (!name) return;

        const initials = name
            .split(' ')
            .map(word => word[0])
            .join('')
            .toUpperCase()
            .substring(0, 2);

        avatar.textContent = initials;
        avatar.style.background = getAvatarColor(name);
    }
    function getAvatarColor(name) {
        const colors = [
            "#6366f1", "#ec4899", "#22c55e",
            "#f59e0b", "#3b82f6", "#ef4444"
        ];

        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }

        return colors[Math.abs(hash % colors.length)];
    }
    function sendMessage() {
        const sender = document.getElementById('senderInput').value;
        const content = document.getElementById('messageInput').value;

        if (!sender || !content) return;

        document.getElementById('username').textContent = sender;

        stompClient.send("/app/sendMessage", {}, JSON.stringify({
            sender: sender,
            content: content
        }));
        updateAvatar(sender);
        document.getElementById('messageInput').value = '';
    }

    document.getElementById('sendMessage').onclick = sendMessage;
    window.onload = connect;
</script>

</body>
</html>
